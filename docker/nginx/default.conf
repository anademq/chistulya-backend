limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ── HTTP: storage subdomain → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    server_name storage.чистуля.рф storage.xn--h1agrefu5d.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: storage.чистуля.рф → MinIO S3 API ─────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name storage.чистуля.рф storage.xn--h1agrefu5d.xn--p1ai;

    ssl_certificate         /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 100M;

    access_log /dev/stdout;
    error_log  /dev/stderr error;

    location / {
        proxy_pass              http://minio:9000;
        # proxy_set_header        Host              $http_host;
        proxy_set_header        Host              minio:9000;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_connect_timeout   300s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;
        proxy_buffering         off;
        proxy_request_buffering off;
    }
}

# ── HTTP: API — certbot challenge + redirect to HTTPS ────────────────────────
server {
    listen 80;
    server_name api.чистуля.рф api.xn--h1agrefu5d.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: API ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name api.чистуля.рф api.xn--h1agrefu5d.xn--p1ai;

    ssl_certificate         /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xn--h1agrefu5d.xn--p1ai/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size        25M;
    large_client_header_buffers 4 32k;
    charset utf-8;

    access_log /dev/stdout;
    error_log  /dev/stderr error;

    gzip            on;
    gzip_comp_level 5;
    gzip_types      application/json text/plain application/javascript text/css;

    # ── Reverb WebSocket ──────────────────────────────────────────────────────
    # Handles both WebSocket connections (/broadcasting/app/{key})
    # and Pusher HTTP API (/broadcasting/apps/{id}).
    # The /broadcasting prefix is stripped before proxying to Reverb.
    # Note: /broadcasting/auth is NOT matched here — it goes to PHP below.
    location ~ ^/broadcasting/apps?/ {
        rewrite ^/broadcasting(/.*)$ $1 break;
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── Application (pure API — all requests routed through Laravel) ──────────
    location / {
        limit_req zone=api burst=60 nodelay;
        fastcgi_pass         app:9000;
        fastcgi_param        SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param        HTTPS on;
        include              fastcgi_params;
        fastcgi_hide_header  X-Powered-By;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
